name: insightface
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
    # PyTorch — CUDA 12.6
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch==2.8.0+cu126
    - torchvision==0.23.0+cu126
    # Core
    - numpy==2.0.2
    - opencv-python==4.13.0.92      # NOT headless — Windows imshow support
    - pillow==11.3.0
    - scikit-learn==1.6.1
    - scipy==1.13.1
    - matplotlib==3.9.4
    # ONNX
    - onnx==1.19.1
    - onnxruntime-gpu==1.19.2       # CPU only → onnxruntime
    # InsightFace
    - insightface==0.7.3
    - easydict==1.13
